name: Deploy to Staging

on:
  push:
    branches: [main]

concurrency:
  group: deploy-staging
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/nickatnight96/btagent-backend
  FRONTEND_IMAGE: ghcr.io/nickatnight96/btagent-frontend

jobs:
  deploy:
    name: Deploy Staging
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set image tag
        id: tag
        run: echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile.backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ steps.tag.outputs.sha }}
            ${{ env.BACKEND_IMAGE }}:staging
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: infra/docker/Dockerfile.frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ steps.tag.outputs.sha }}
            ${{ env.FRONTEND_IMAGE }}:staging
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Configure kubectl
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG_STAGING }}

      - name: Deploy to staging
        run: |
          helm upgrade --install btagent ./infra/helm/btagent \
            -f infra/helm/btagent/values.yaml \
            -f infra/helm/btagent/values-staging.yaml \
            --set image.tag=${{ steps.tag.outputs.sha }} \
            --set frontendImage.tag=${{ steps.tag.outputs.sha }} \
            --namespace btagent-staging \
            --create-namespace \
            --wait \
            --timeout 5m

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/btagent-backend -n btagent-staging --timeout=120s
          kubectl rollout status deployment/btagent-frontend -n btagent-staging --timeout=120s

      - name: Run smoke tests
        run: |
          STAGING_URL=$(kubectl get ingress btagent -n btagent-staging -o jsonpath='{.spec.rules[0].host}')
          curl --fail --retry 5 --retry-delay 5 "https://${STAGING_URL}/api/health" || echo "Smoke test warning: health endpoint not reachable"
