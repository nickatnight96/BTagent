name: CI Failure Handler

# Durable "hook" for PR CI failures: when the main CI workflow fails on a
# pull request, automatically re-run the failed jobs ONCE (to absorb transient
# / infra flakes like a runner hiccup), and if it still fails after that retry,
# post a PR comment escalating it for a human/agent to fix.
#
# This complements (does not replace) the per-job failure comments the E2E/UAT
# jobs already post. It runs from the default branch via ``workflow_run`` so it
# has the permissions to re-run jobs and comment.

on:
  workflow_run:
    workflows: ["BTagent CI"]
    types: [completed]

# Least privilege: re-run jobs (actions:write) + comment on the PR.
permissions:
  contents: read
  actions: write
  pull-requests: write

jobs:
  handle-failure:
    name: Auto-retry then escalate
    runs-on: ubuntu-latest
    # Only act on FAILED CI runs that were triggered by a pull request.
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.event == 'pull_request'
    steps:
      - name: Auto-retry failed jobs once, else escalate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          RUN_ATTEMPT: ${{ github.event.workflow_run.run_attempt }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
          # pull_requests[] is populated for same-repo PRs (incl. dependabot).
          PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
        run: |
          set -euo pipefail
          echo "CI run $RUN_ID failed (attempt $RUN_ATTEMPT) for PR #${PR_NUMBER:-unknown}"

          if [ "$RUN_ATTEMPT" -lt 2 ]; then
            # First failure: re-run only the failed jobs once. This absorbs
            # transient runner/network/startup flakes without human action.
            echo "First attempt — re-running failed jobs once."
            gh run rerun "$RUN_ID" --failed
            exit 0
          fi

          # Already retried at least once and still failing → escalate.
          echo "Run still failing after auto-retry — escalating."
          if [ -z "${PR_NUMBER:-}" ]; then
            echo "No PR number on the event (likely a fork PR); cannot comment."
            exit 0
          fi

          body=$(cat <<EOF
          🔴 **CI failed after an automatic re-run.** This is past the one-shot
          transient retry, so it likely needs a real fix.

          - Failed run: ${RUN_URL}
          - Attempts: ${RUN_ATTEMPT}

          _Auto-generated by the CI Failure Handler. If all jobs failed within
          a few seconds of starting, check **Settings → Billing → Actions usage**
          (quota) or [GitHub status](https://www.githubstatus.com) before
          assuming a code bug._
          EOF
          )
          gh pr comment "$PR_NUMBER" --body "$body" --repo "$GH_REPO" \
            || echo "gh pr comment failed (non-fatal)"
