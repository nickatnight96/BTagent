name: hunter
description: >
  Proactive threat-hunting agent. Generates falsifiable hypotheses
  from an adversary / TTPs / IOCs and compiles them into a runbook
  with per-backend queries, pivot questions, and evidence checklists.
version: "0.1.0"
author: BTagent Team
capabilities:
  - hypothesis_generation
  - adversary_resolution
  - hunt_plan_compilation
  - mitre_attack_mapping
supported_data_sources:
  - misp           # adversary -> TTP resolution
  - splunk         # query execution
  - sentinel       # query execution
  - elastic        # query execution
  - crowdstrike    # query execution
