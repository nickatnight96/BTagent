title: Entra ID Service Principal Credential Addition
id: 7c4b9a1e-2d3f-4e5a-8b6c-9d0e1f2a3b4c
status: test
description: >
  Detects when a new client secret or certificate is added to a service principal
  in Microsoft Entra ID. Attackers who compromise an admin account use this
  technique (T1098.001) to add rogue credentials to high-privilege service
  principals, enabling persistent, MFA-bypass access to Azure resources and
  Microsoft Graph API. The attack is particularly dangerous because service
  principal credentials are long-lived and do not require MFA by default.
references:
  - https://attack.mitre.org/techniques/T1098/001/
  - https://posts.specterops.io/azure-privilege-escalation-using-managed-identities-1a9dd5eba66
author: BTagent
date: 2026-06-18
logsource:
  product: azure
  service: auditlogs
detection:
  selection_operation:
    OperationName:
      - "Add service principal credentials"
      - "Update application – Certificates and secrets management"
      - "Add application"
    ResultStatus: "Success"
  selection_category:
    Category: "ApplicationManagement"
  condition: selection_operation and selection_category
falsepositives:
  - Legitimate credential rotation by DevOps teams (should have change record)
  - CI/CD pipeline bootstrap credential creation (tune on known automation accounts)
  - Entra App Registration lifecycle management
level: high
tags:
  - attack.persistence
  - attack.privilege-escalation
  - attack.t1098.001
  - attack.t1098
