title: Entra ID High-Confidence Risky Sign-In
id: 6d3e2f1a-4b5c-6d7e-8f9a-0b1c2d3e4f5a
status: test
description: >
  Surfaces Microsoft Entra Identity Protection HIGH-risk-level sign-in events.
  These are generated by Microsoft's ML-based risk engine and represent high-
  confidence indicators of account compromise (T1078): impossible travel,
  leaked credentials, malware-linked IPs, anonymous IPs, or password spray
  patterns detected by Microsoft's cross-tenant visibility. Requires Entra
  ID P2 licence on the tenant.
references:
  - https://attack.mitre.org/techniques/T1078/
  - https://learn.microsoft.com/en-us/entra/id-protection/concept-identity-protection-risks
author: BTagent
date: 2026-06-18
logsource:
  product: azure
  service: signinlogs
detection:
  selection:
    riskLevelDuringSignIn: "high"
    riskState: "atRisk"
  condition: selection
falsepositives:
  - Known VPN exit nodes or corporate proxy IPs triggering anonymous-IP heuristic
  - RDP jump boxes in cloud regions that Microsoft flags as high-risk IPs
  - Penetration testing (tune on known pentest source IPs / user accounts)
level: high
tags:
  - attack.initial-access
  - attack.credential-access
  - attack.t1078
  - attack.t1078.004
