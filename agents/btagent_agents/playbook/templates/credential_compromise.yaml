name: Credential Compromise
version: "1.0"
description: Automated credential compromise investigation and remediation
trigger:
  type: alert_severity
  parameters:
    min_severity: high
    category: credential_compromise
steps:
  - id: classify_alert
    type: action
    name: Classify credential compromise alert
    tool_name: alert_classifier
    arguments: {source: identity_provider, category: credential_compromise}
    next_step: check_login_anomalies
  - id: check_login_anomalies
    type: action
    name: Query authentication logs for anomalies
    tool_name: splunk_search
    arguments: {query_type: auth_anomaly, timeframe: 7d}
    next_step: enrich_source_ips
  - id: enrich_source_ips
    type: action
    name: Enrich source IPs from suspicious logins
    tool_name: enrich_ioc
    arguments: {ioc_types: [ip, domain]}
    next_step: check_confirmed_compromise
  - id: check_confirmed_compromise
    type: decision
    name: Is credential compromise confirmed?
    condition: "enrichment.max_confidence > 0.6"
    true_branch: assess_access
    false_branch: log_suspicious
  - id: assess_access
    type: action
    name: Assess accessed resources and data exposure
    tool_name: sentinel_search
    arguments: {query_type: resource_access_audit, scope: compromised_user}
    next_step: check_sensitive_access
  - id: check_sensitive_access
    type: decision
    name: Was sensitive data accessed?
    condition: "access_audit.sensitive_resources > 0"
    true_branch: approve_reset
    false_branch: force_reset
  - id: approve_reset
    type: hitl_gate
    name: Approve credential reset and session revocation
    prompt: "Sensitive data was accessed. Force password reset, revoke all sessions, and notify affected users?"
    required_role: senior_analyst
    timeout_seconds: 1800
    next_step: parallel_remediate
  - id: force_reset
    type: action
    name: Force password reset for compromised account
    tool_name: sentinel_search
    arguments: {action: force_password_reset}
    next_step: revoke_sessions
  - id: parallel_remediate
    type: parallel_fork
    name: Execute remediation in parallel
    branches:
      - [reset_credentials]
      - [revoke_tokens]
      - [block_source_ips]
    next_step: generate_report
  - id: reset_credentials
    type: action
    name: Reset credentials for compromised accounts
    tool_name: sentinel_search
    arguments: {action: force_password_reset}
    next_step: join_remediate
  - id: revoke_tokens
    type: action
    name: Revoke all active sessions and API tokens
    tool_name: sentinel_search
    arguments: {action: revoke_sessions}
    next_step: join_remediate
  - id: block_source_ips
    type: action
    name: Block malicious source IPs at firewall
    tool_name: splunk_search
    arguments: {action: block_iocs}
    next_step: join_remediate
  - id: join_remediate
    type: join
    name: Wait for all remediation actions
    next_step: generate_report
  - id: revoke_sessions
    type: action
    name: Revoke active sessions
    tool_name: sentinel_search
    arguments: {action: revoke_sessions}
    next_step: generate_report
  - id: generate_report
    type: action
    name: Generate credential compromise report
    tool_name: query_generator
    arguments: {report_type: credential_compromise}
    next_step: end
  - id: log_suspicious
    type: action
    name: Log suspicious activity for monitoring
    tool_name: alert_classifier
    arguments: {action: log_monitoring}
    next_step: end
  - id: end
    type: end
    name: Playbook complete
