title: IAM Account Password Policy Weakened — Potential Auth Control Tampering
id: 6d9f4060-33d0-4fd6-b4f2-ad3f7689422d
status: test
description: >-
  Detects UpdateAccountPasswordPolicy events that reduce the minimum password
  length or disable complexity requirements (symbols, numbers, mixed case).
  Weakening the account-wide password policy lowers the bar for credential
  guessing and is a tampering technique used to ease persistence after gaining
  IAM administrative access.
references:
  - https://attack.mitre.org/techniques/T1556/
author: BTagent (Wave D)
date: 2026-06-24
logsource:
  product: aws
  service: cloudtrail
detection:
  selection:
    eventSource: iam.amazonaws.com
    eventName: UpdateAccountPasswordPolicy
  weakening:
    - requestParameters.requireSymbols: false
    - requestParameters.requireNumbers: false
    - requestParameters.requireLowercaseCharacters: false
    - requestParameters.requireUppercaseCharacters: false
  condition: selection and weakening
falsepositives:
  - Sanctioned security-baseline changes applied by a governance pipeline — verify the change tightens rather than relaxes policy and that it originates from the approved IaC principal; downstream triage reviews the resulting policy delta
level: medium
tags:
  - attack.credential-access
  - attack.t1556
  - cloud.credential-access
