title: Secrets Manager Secret Value Retrieved — Potential Bulk Secret Theft
id: e8395ba5-a3ed-4f72-9e27-669eeb2dc9e9
status: test
description: >-
  Detects GetSecretValue or BatchGetSecretValue events in AWS Secrets Manager,
  the single-event signature of credential harvesting.  A compromised principal
  enumerating and reading secrets is a primary cloud credential-access vector;
  downstream triage clustering groups repeated reads into a bulk-exfiltration
  signal rather than relying on in-rule aggregation.
references:
  - https://attack.mitre.org/techniques/T1552/005/
author: BTagent (Wave D)
date: 2026-06-24
logsource:
  product: aws
  service: cloudtrail
detection:
  selection:
    eventSource: secretsmanager.amazonaws.com
    eventName:
      - GetSecretValue
      - BatchGetSecretValue
  filter_known_automation:
    userIdentity.arn|contains:
      - ':assumed-role/PipelineRole'
      - ':assumed-role/AppRuntimeRole'
      - ':user/svc-'
  condition: selection and not filter_known_automation
falsepositives:
  - Application runtimes and CI/CD pipelines legitimately reading their own secrets — add their roles to filter_known_automation; downstream triage clusters per-principal read volume to surface anomalous bulk access
level: high
tags:
  - attack.credential-access
  - attack.t1552.005
  - cloud.credential-access
