title: Kubernetes Pod Auto-Mounting Service Account Token in Sensitive Namespace
id: ff838ddf-638d-492c-b5e5-c7cacb3a4a33
status: test
description: >-
  Detects creation of a Pod that auto-mounts its service account token
  (automountServiceAccountToken=true) in a sensitive namespace such as
  kube-system.  A mounted SA token gives a compromised container API credentials
  it can use to escalate or move laterally across the cluster.
references:
  - https://attack.mitre.org/techniques/T1528/
author: BTagent (Wave D)
date: 2026-06-24
logsource:
  product: kubernetes
  service: audit
detection:
  selection:
    verb: create
    objectRef.resource: pods
    requestObject.spec.automountServiceAccountToken: true
    objectRef.namespace:
      - kube-system
      - kube-node-lease
      - kube-public
  condition: selection
falsepositives:
  - Control-plane / platform workloads in system namespaces that legitimately need
    API access — tune the namespace list and allow-list known controller service
    accounts after live wiring.
level: medium
tags:
  - attack.credential-access
  - attack.t1528
  - container.credential-access
