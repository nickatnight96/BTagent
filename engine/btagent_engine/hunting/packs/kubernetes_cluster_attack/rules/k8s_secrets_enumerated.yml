title: Kubernetes Secrets Enumerated Across Namespaces
id: deb69ae7-cc19-48d1-a014-3c6ac3012e85
status: test
description: >-
  Detects get/list requests against Kubernetes secrets.  Bulk enumeration of
  secrets is a credential-access technique used to harvest service-account tokens,
  registry pulls, and application secrets for privilege escalation and lateral
  movement.  This is a single-event signature; downstream triage clustering
  identifies high-volume enumeration sweeps.
references:
  - https://attack.mitre.org/techniques/T1552/
author: BTagent (Wave D)
date: 2026-06-24
logsource:
  product: kubernetes
  service: audit
detection:
  selection:
    verb:
      - get
      - list
    objectRef.resource: secrets
  condition: selection
falsepositives:
  - Controllers and operators that legitimately read secrets (cert-manager, external-secrets) generate steady low-volume reads; downstream triage clustering separates routine controller access from anomalous sweeps by a single principal across many namespaces.
level: medium
tags:
  - attack.credential-access
  - attack.t1552
  - kubernetes.credential-access
