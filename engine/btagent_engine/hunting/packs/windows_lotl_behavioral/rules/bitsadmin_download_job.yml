title: BITS Remote File Download via bitsadmin or Start-BitsTransfer
id: e5b30d43-feee-460d-af6d-a0e81461ec6a
status: test
description: >-
  Detects use of the Background Intelligent Transfer Service to fetch a remote
  file, either via bitsadmin /transfer or PowerShell Start-BitsTransfer. BITS
  jobs survive reboots and run under a trusted service, making this a stealthy
  ingress-tool-transfer and persistence channel.
references:
  - https://attack.mitre.org/techniques/T1197/
author: BTagent (Wave D)
date: 2026-06-24
logsource:
  category: process_creation
  product: windows
detection:
  selection_bitsadmin:
    Image|endswith: \bitsadmin.exe
    CommandLine|contains: '/transfer'
  selection_powershell:
    CommandLine|contains: 'Start-BitsTransfer'
  condition: selection_bitsadmin or selection_powershell
falsepositives:
  - Legitimate patch-management and software-updater workflows use BITS; baseline
    on known updater hosts. Repeated/high-volume jobs are clustered by downstream
    triage rather than aggregated in-rule.
level: medium
tags:
  - attack.defense-evasion
  - attack.t1197
  - windows.lolbin
