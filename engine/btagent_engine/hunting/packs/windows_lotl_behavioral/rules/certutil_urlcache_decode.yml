title: Certutil URLCache Download or Decode Abuse
id: 35f651b2-aa92-4929-9ca2-b5f655af5e1d
status: test
description: >-
  Detects certutil.exe used to download a remote file (-urlcache -split -f) or to
  deobfuscate a local payload (-decode). certutil is a signed certificate utility
  routinely abused as a LOLBin for ingress tool transfer and on-host
  deobfuscation, evading allowlisting controls.
references:
  - https://attack.mitre.org/techniques/T1140/
author: BTagent (Wave D)
date: 2026-06-24
logsource:
  category: process_creation
  product: windows
detection:
  selection_img:
    Image|endswith: \certutil.exe
  selection_download:
    CommandLine|contains:
      - '-urlcache'
      - 'urlcache'
  selection_decode:
    CommandLine|contains:
      - '-decode'
      - 'decode'
  condition: selection_img and (selection_download or selection_decode)
falsepositives:
  - Rare; certutil -decode appears in some legitimate certificate-handling scripts.
    Near-zero baseline — investigate hits and allowlist specific known scripts.
level: high
tags:
  - attack.defense-evasion
  - attack.t1140
  - windows.lolbin
