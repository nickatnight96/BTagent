title: GCP Service Account Key Created — Long-Lived Credential Minted
id: bf090589-be78-4caa-93f5-7a5de55068ad
status: test
description: >-
  Detects google.iam.admin.v1.CreateServiceAccountKey events, which mint a
  long-lived user-managed key for a GCP service account.  Such keys persist
  beyond the current session and bypass short-lived workload-identity controls,
  making them a favoured persistence and credential-theft vector.
references:
  - https://attack.mitre.org/techniques/T1098/
author: BTagent (Wave D)
date: 2026-06-24
logsource:
  product: gcp
  service: audit
detection:
  selection:
    protoPayload.methodName: google.iam.admin.v1.CreateServiceAccountKey
  filter_automation:
    # Known IaC/rotation principals — tune per environment.
    protoPayload.authenticationInfo.principalEmail|endswith:
      - terraform@iam.gserviceaccount.com
      - key-rotation@iam.gserviceaccount.com
  condition: selection and not filter_automation
falsepositives:
  - Legitimate key rotation via automated tooling — add the rotation service account to filter_automation
  - Onboarding of new external integrations that require static keys
level: high
tags:
  - attack.persistence
  - attack.t1098
  - cloud.persistence
