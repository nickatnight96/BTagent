title: LLM Response Contains Credential-Shaped Token (Defensive Telemetry)
id: a1d12101-1a1b-4c8d-a8f7-000000000005
status: test
description: >
  Detects when an LLM response payload captured by the inference-gateway
  telemetry contains a credential-shaped token (AWS access key id pattern,
  Slack-bot-token prefix, GitHub personal access token prefix).  This is a
  signal that an upstream prompt-injection attack succeeded in eliciting a
  secret-leak response, or that the model has been trained / fine-tuned on
  data containing live credentials.
references:
  - https://owasp.org/www-project-top-10-for-large-language-model-applications/  # LLM06 Sensitive Information Disclosure
  - https://atlas.mitre.org/techniques/AML.T0057  # LLM Data Leakage
author: BTagent (#121)
date: 2026-06-22
logsource:
  product: llm_gateway
  service: response_capture
detection:
  selection_aws_akid:
    response_body|re: '\bAKIA[0-9A-Z]{16}\b'
  selection_slack:
    response_body|re: '\b(?:xox[abprs]-[0-9A-Za-z-]{10,})\b'
  selection_ghp:
    response_body|re: '\bghp_[0-9A-Za-z]{36}\b'
  condition: selection_aws_akid or selection_slack or selection_ghp
falsepositives:
  - Documentation responses that quote credential FORMATS (revoke any real
    credentials matched anyway)
  - Test fixtures embedded in vendor docs
level: high
tags:
  - attack.credential-access
  - attack.t1552
  - attack.exfiltration
  - agentic.data-exfil
notes: >
  Requires an LLM-gateway response-capture telemetry source.  Code-based
  output-side scanning is deferred — the prompt-injection input-side scan in
  btagent_shared.hunt.agentic.detect_prompt_injection covers the request side.
