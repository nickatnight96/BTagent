title: STS Identity Probe — Stolen Credential Confirmation
id: 537b86aa-e8ab-4877-af6b-f8c9183ca4b7
status: test
description: >-
  Detects STS GetCallerIdentity and GetSessionToken calls used to confirm which
  principal a set of credentials belongs to.  This is a hallmark early action
  after credential theft, when an adversary validates stolen keys before acting.
references:
  - https://attack.mitre.org/techniques/T1078/004/
author: BTagent (Wave D)
date: 2026-06-24
logsource:
  product: aws
  service: cloudtrail
detection:
  selection:
    eventSource: sts.amazonaws.com
    eventName:
      - GetCallerIdentity
      - GetSessionToken
  filter_aws_services:
    userIdentity.type: AWSService
  condition: selection and not filter_aws_services
falsepositives:
  - SDKs and IaC/CI tooling call GetCallerIdentity routinely to resolve the
    active identity; baseline is high for automation principals.  This is a
    single-event signature — downstream triage clustering handles volume, so the
    signal is a probe from a new/unexpected principal or one immediately followed
    by enumeration or privilege-bearing actions.
level: low
tags:
  - attack.initial-access
  - attack.t1078.004
  - cloud.discovery
