worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # Performance
    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;
    # ``health`` zone exists so /health can't be used as a DDoS amplifier; the
    # rate is generous because legitimate liveness probes hit it frequently.
    limit_req_zone $binary_remote_addr zone=health:10m rate=300r/m;

    # Upstreams
    upstream backend {
        server backend:8000;
    }

    upstream frontend {
        server frontend:80;
    }

    server {
        # TLS termination is expected at the ingress / load-balancer layer in
        # front of this nginx (Helm values configure ingress with cert-manager).
        # We listen on plain HTTP inside the cluster; HSTS + CSP below are still
        # set so they reach the client even when traffic egresses TLS upstream.
        listen 80;
        server_name _;

        # Security headers
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        # CSP: tight default. ``connect-src`` includes ``ws:``/``wss:`` so the
        # WebSocket hub works on same-origin; ``script-src`` allows
        # ``wasm-unsafe-eval`` so future LLM-side WASM (tokenisers, etc.) keeps
        # working. Update connect-src if integrating with external SaaS APIs
        # that need direct browser->vendor calls (most should stay backend-side).
        add_header Content-Security-Policy
            "default-src 'self'; "
            "script-src 'self' 'wasm-unsafe-eval'; "
            "style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; "
            "font-src 'self' https://fonts.gstatic.com; "
            "img-src 'self' data: blob:; "
            "connect-src 'self' ws: wss:; "
            "frame-ancestors 'none'; "
            "base-uri 'self'; "
            "form-action 'self';"
            always;

        # API routes
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # Auth rate limiting (stricter)
        location /api/v1/auth/ {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # WebSocket
        location /ws/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # Health check — generous rate-limit so /health can't be abused as a
        # DDoS amplifier while still serving k8s liveness/readiness probes.
        location /health {
            limit_req zone=health burst=50 nodelay;
            proxy_pass http://backend;
        }

        # Frontend (catch-all)
        location / {
            proxy_pass http://frontend;
        }
    }
}
