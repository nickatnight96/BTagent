# Frontend SPA server config baked into the production frontend image
# (``infra/docker/Dockerfile.frontend``). It serves the built React bundle
# and ships the same defense-in-depth security headers the cluster ingress
# (``infra/nginx/nginx.conf``) and the backend middleware emit, so the
# hardened posture is the DEFAULT even in topologies that serve the frontend
# image directly without the ingress in front of it (B7, #141).
#
# Header values are aligned with the Playwright ``@nginx`` specs in
# ``tests/e2e/specs/security/clickjack-headers.spec.ts``:
#   - X-Frame-Options: DENY
#   - X-Content-Type-Options: nosniff
#   - Strict-Transport-Security: max-age=...
#   - Content-Security-Policy: present, script-src WITHOUT 'unsafe-inline',
#     and a frame-ancestors directive.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers (defense in depth) ──────────────────────────────
    # X-Frame-Options + the CSP frame-ancestors directive both block click-
    # jacking; older browsers honour the header, modern ones the directive.
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    # TLS is terminated at the ingress / load balancer; HSTS is still set
    # here so it reaches the client when the frontend image is served
    # behind a TLS-terminating proxy without the cluster ingress.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # CSP for the React SPA. ``script-src 'self'`` (no 'unsafe-inline' —
    # Vite externalises all JS into hashed module bundles). ``style-src``
    # needs 'unsafe-inline' for the inline <style> in index.html plus the
    # Google Fonts stylesheet. ``connect-src`` allows same-origin XHR/fetch
    # and the WebSocket hub upgrade (ws:/wss:).
    add_header Content-Security-Policy
        "default-src 'self'; "
        "script-src 'self' 'wasm-unsafe-eval'; "
        "style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; "
        "font-src 'self' https://fonts.gstatic.com data:; "
        "img-src 'self' data: blob:; "
        "connect-src 'self' ws: wss:; "
        "frame-ancestors 'none'; "
        "base-uri 'self'; "
        "object-src 'none'; "
        "form-action 'self';"
        always;

    # SPA routing: fall back to index.html for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
