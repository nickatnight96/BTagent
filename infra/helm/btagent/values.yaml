# -- Backend configuration
replicaCount: 1

image:
  repository: ghcr.io/nickatnight96/btagent-backend
  # ``Always`` (rather than ``IfNotPresent``) so a redeploy that reuses a
  # mutable tag (e.g. ``latest``, ``staging``) actually pulls the new image
  # instead of using a stale local cache. Once images are pinned by digest in
  # CI (see infra/docker/Dockerfile.* for the build-arg pattern), this can
  # safely revert to ``IfNotPresent`` for image-pull bandwidth savings.
  pullPolicy: Always
  tag: latest

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# -- Frontend configuration
frontendImage:
  repository: ghcr.io/nickatnight96/btagent-frontend
  # ``Always`` (rather than ``IfNotPresent``) so a redeploy that reuses a
  # mutable tag (e.g. ``latest``, ``staging``) actually pulls the new image
  # instead of using a stale local cache. Once images are pinned by digest in
  # CI (see infra/docker/Dockerfile.* for the build-arg pattern), this can
  # safely revert to ``IfNotPresent`` for image-pull bandwidth savings.
  pullPolicy: Always
  tag: latest

frontendReplicaCount: 1

# -- Service account
serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

# -- Pod-level security context
podSecurityContext:
  fsGroup: 1000

# -- Container-level security context
securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

# -- Backend service
service:
  type: ClusterIP
  port: 8000

# -- Frontend service
frontendService:
  type: ClusterIP
  port: 80

# -- Ingress
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: btagent.example.com
      paths:
        - path: /api
          pathType: Prefix
          service: backend
        - path: /ws
          pathType: Prefix
          service: backend
        - path: /
          pathType: Prefix
          service: frontend
  tls:
    - secretName: btagent-tls
      hosts:
        - btagent.example.com

# -- Resource limits and requests
resources:
  limits:
    cpu: 1000m
    memory: 2Gi
  requests:
    cpu: 250m
    memory: 512Mi

frontendResources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 50m
    memory: 64Mi

# -- Database migrations (alembic upgrade head)
# Runs as a Helm pre-install/pre-upgrade hook Job before the backend rolls out,
# using the same backend image and the same config/secret env (for
# BTAGENT_DATABASE_URL) as the Deployment.
migrations:
  enabled: true
  # Job retries on failure. Kept low so a broken migration fails fast and blocks
  # the rollout rather than hammering the database.
  backoffLimit: 1
  # Hard cap on the Job's total runtime (seconds); leave empty to disable.
  activeDeadlineSeconds: 600
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi

# -- Horizontal Pod Autoscaler
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 85

# -- Pod Disruption Budget
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# -- Network Policy
networkPolicy:
  enabled: true

# -- Liveness and readiness probes (backend)
livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 15
  periodSeconds: 20
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

# -- Node and scheduling
nodeSelector: {}
tolerations: []
affinity: {}

# -- Environment variables from ConfigMap
env:
  BTAGENT_ENV: production
  BTAGENT_LOG_LEVEL: info
  BTAGENT_OTEL_ENABLED: "true"

# -- Secrets (injected from external secret store or Kubernetes secrets)
secretEnv:
  BTAGENT_DATABASE_URL: ""
  BTAGENT_REDIS_URL: ""
  BTAGENT_JWT_SECRET: ""
  BTAGENT_S3_ENDPOINT: ""
  BTAGENT_S3_ACCESS_KEY: ""
  BTAGENT_S3_SECRET_KEY: ""

# -- Extra volumes for read-only root filesystem (tmp, cache)
extraVolumes:
  - name: tmp
    emptyDir: {}
  - name: cache
    emptyDir: {}

extraVolumeMounts:
  - name: tmp
    mountPath: /tmp
  - name: cache
    mountPath: /app/.cache
