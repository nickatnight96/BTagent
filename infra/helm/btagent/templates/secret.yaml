apiVersion: v1
kind: Secret
metadata:
  name: {{ include "btagent.fullname" . }}-secret
  labels:
    {{- include "btagent.labels" . | nindent 4 }}
  {{- if .Values.migrations.enabled }}
  annotations:
    # See configmap.yaml: created as a pre-install/pre-upgrade hook (weight -5,
    # ahead of the migrate Job at weight 5) so the Job's `envFrom` can read
    # BTAGENT_DATABASE_URL on a fresh install, before the main Deployment rolls.
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
  {{- end }}
type: Opaque
data:
  {{- range $key, $value := .Values.secretEnv }}
  {{- if $value }}
  {{ $key }}: {{ $value | b64enc | quote }}
  {{- end }}
  {{- end }}
