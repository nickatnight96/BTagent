# Production-specific overrides
replicaCount: 3
frontendReplicaCount: 2

image:
  pullPolicy: Always

frontendImage:
  pullPolicy: Always

ingress:
  hosts:
    - host: btagent.example.com
      paths:
        - path: /api
          pathType: Prefix
          service: backend
        - path: /ws
          pathType: Prefix
          service: backend
        - path: /
          pathType: Prefix
          service: frontend
  tls:
    - secretName: btagent-production-tls
      hosts:
        - btagent.example.com

resources:
  limits:
    cpu: 2000m
    memory: 4Gi
  requests:
    cpu: 500m
    memory: 1Gi

frontendResources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

podDisruptionBudget:
  enabled: true
  minAvailable: 2

env:
  BTAGENT_ENV: production
  BTAGENT_LOG_LEVEL: warning
  BTAGENT_OTEL_ENABLED: "true"
  BTAGENT_MOCK_CONNECTORS: "false"
  # Scheduled hunt-pack cron gate. The default hunt backends target Splunk,
  # whose LIVE execution path is not yet wired (raises NotImplementedError),
  # so with mock connectors off every scheduled tick would create zero
  # findings. We pin it OFF explicitly here; flip to "true" only once live
  # SIEM/EDR hunt execution is configured, otherwise the cron just logs a
  # one-line warning and no-ops each tick.
  BTAGENT_HUNT_SCHEDULE_ENABLED: "false"
